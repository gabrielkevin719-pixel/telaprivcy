    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso Exclusivo</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            background-color: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: "Inter", sans-serif;
            padding: 20px;
        }

        .container {
            background-color: #fff;
            border-radius: 16px;
            text-align: center;
            padding: 32px 20px;
            width: 92%;
            max-width: 420px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
            animation: fadeIn 1s ease;
        }

        img.logo {
            width: 120px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 1.4rem;
            color: #111;
            margin-bottom: 12px;
        }

        p {
            color: #555;
            font-size: 0.95rem;
            line-height: 1.4;
            margin-bottom: 24px;
        }

        .btn {
            background-color: #ff7a1a;
            color: #fff;
            border: none;
            padding: 16px 0;
            width: 100%;
            font-weight: bold;
            font-size: 1rem;
            border-radius: 8px;
            cursor: pointer;
            animation: pulse 1.5s infinite;
            transition: 0.3s;
        }

        .btn:hover {
            background-color: #ff8c33;
        }

        footer {
            margin-top: 20px;
            text-align: center;
            font-size: 0.8rem;
            color: #aaa;
        }

        footer a {
            color: #ccc;
            text-decoration: none;
        }

        footer a:hover {
            text-decoration: underline;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
            100% {
                transform: scale(1);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>

    <!-- Back Redirect -->
    <script>
        (function() {
            var backUrl = new URL('../back/index.html', window.location.href).href;
            var params = new URLSearchParams(window.location.search);
            var sep = backUrl.indexOf('?') > 0 ? '&' : '?';
            var qs = params.toString();
            if (qs) backUrl = backUrl + sep + qs;
            history.pushState(null, '', window.location.href);
            history.pushState(null, '', window.location.href);
            history.pushState(null, '', window.location.href);
            window.addEventListener('popstate', function() {
                window.location.href = backUrl;
            });
        })();
    </script>

</head>

<body>
    <div class="container">
        <img class="logo" src="duda-dally.site/pressel/images/logo.webp" alt="Logo">

        <h1>Confirmação de Idade</h1>
        <p>Por favor, confirme sua idade para continuar.</p>

        <button class="btn" onclick="redirecionar()">Tenho mais de 18 anos</button>
        <script>
            function redirecionar() {
                // Redireciona para a página principal mantendo UTMs
                window.location.href = '/duda-dally.site/priv/' + window.location.search;
            }
        </script>
    </div>

    <footer>
        <p>
            <a href="politica.html">Política de Privacidade</a> •
            <a href="termos.html">Termos de Uso</a>
        </p>
    </footer>
